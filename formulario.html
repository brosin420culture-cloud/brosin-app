<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brosin · Añade tu local</title>
<meta http-equiv="refresh" content="0; url=https://docs.google.com/forms/d/e/1FAIpQLScSr4NrxgJ2Bp2ivxi8VwDqEUVuJJ52pqDle6Rhk2hsioQovw/viewform">
<link rel="canonical" href="https://docs.google.com/forms/d/e/1FAIpQLScSr4NrxgJ2Bp2ivxi8VwDqEUVuJJ52pqDle6Rhk2hsioQovw/viewform">
<link href="https://fonts.googleapis.com/css2?family=Bagel+Fat+One&family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--yellow:#FFD400;--black:#141414;--soft:#cfcfcf}
*{box-sizing:border-box}
body{margin:0;min-height:100vh;background:radial-gradient(circle at 50% 0%,#243018,#141414 72%);color:#fff;font-family:'Poppins',system-ui,sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:34px 20px;background-image:radial-gradient(rgba(255,255,255,.05) 1px,transparent 1px);background-size:16px 16px}
.brand{font-family:'Bagel Fat One',cursive;color:var(--yellow);font-size:2.4rem;line-height:1}
.msg{margin-top:16px;font-size:1.05rem;color:var(--soft)}
.spin{margin:22px auto;width:34px;height:34px;border:4px solid rgba(255,255,255,.2);border-top-color:var(--yellow);border-radius:50%;animation:sp 1s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.btn{margin-top:10px;background:var(--yellow);color:var(--black);font-weight:800;font-size:1rem;padding:14px 24px;border-radius:999px;text-decoration:none}
.tag{margin-top:26px;font-size:.8rem;color:#8fa383;font-style:italic}
</style>
</head>
<body>
  <div class="brand">🐝 BROSIN</div>
  <div class="msg">Abriendo el formulario para añadir tu local…</div>
  <div class="spin"></div>
  <a class="btn" href="https://docs.google.com/forms/d/e/1FAIpQLScSr4NrxgJ2Bp2ivxi8VwDqEUVuJJ52pqDle6Rhk2hsioQovw/viewform">Si no se abre solo, pulsa aquí →</a>
  <div class="tag">bro, no te quedes sin 🐝</div>
<script>window.location.replace("https://docs.google.com/forms/d/e/1FAIpQLScSr4NrxgJ2Bp2ivxi8VwDqEUVuJJ52pqDle6Rhk2hsioQovw/viewform");</script>
</body>
</html>
